<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Tài khoản - Xuân Công Shop</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      /* CSS ẩn hiện mượt mà cho các form */
      .auth-section {
        display: none;
        animation: fadeIn 0.3s ease-in-out;
      }
      .active-form {
        display: block;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .auth-links {
        margin-top: 20px;
        text-align: center;
        font-size: 14px;
      }
      .auth-links a {
        color: var(--text-gray);
        text-decoration: none;
        margin: 0 10px;
        transition: 0.2s;
      }
      .auth-links a:hover {
        color: var(--primary-color);
      }
      .highlight-link {
        color: var(--primary-color) !important;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <header><a href="index.html" class="logo">Xuân Công Shop</a></header>

    <div class="container">
      <div class="form-container auth-section active-form" id="form-login">
        <h2
          style="
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 20px;
          "
        >
          Đăng Nhập
        </h2>
        <input
          type="text"
          id="login-user"
          placeholder="Tên đăng nhập (Thử: admin)"
        />
        <input
          type="password"
          id="login-pass"
          placeholder="Mật khẩu (Thử: 123)"
        />
        <button class="btn-primary" style="width: 100%" onclick="handleLogin()">
          Đăng nhập
        </button>

        <div class="auth-links">
          <a
            href="#"
            class="highlight-link"
            onclick="switchForm('form-register')"
            >Tạo tài khoản mới</a
          >
          <br /><br />
          <a href="#" onclick="switchForm('form-forgot')">Quên mật khẩu?</a>
        </div>
      </div>

      <div class="form-container auth-section" id="form-register">
        <h2
          style="
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 20px;
          "
        >
          Đăng Ký
        </h2>
        <input type="text" id="reg-user" placeholder="Tên đăng nhập muốn tạo" />
        <input type="password" id="reg-pass" placeholder="Mật khẩu" />
        <button
          class="btn-primary"
          style="width: 100%"
          onclick="handleRegister()"
        >
          Đăng ký ngay
        </button>

        <div class="auth-links">
          <a href="#" onclick="switchForm('form-login')"
            >Đã có tài khoản? <b>Đăng nhập</b></a
          >
        </div>
      </div>

      <div class="form-container auth-section" id="form-forgot">
        <h2
          style="
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 20px;
          "
        >
          Khôi Phục Mật Khẩu
        </h2>
        <p
          style="
            text-align: center;
            font-size: 13px;
            color: #aaa;
            margin-bottom: 15px;
          "
        >
          Nhập tên tài khoản của bạn để đổi mật khẩu mới
        </p>
        <input
          type="text"
          id="forgot-user"
          placeholder="Tên đăng nhập của bạn"
        />
        <input
          type="password"
          id="forgot-new-pass"
          placeholder="Nhập mật khẩu mới"
        />
        <button
          class="btn-primary"
          style="width: 100%"
          onclick="handleForgot()"
        >
          Đổi mật khẩu
        </button>

        <div class="auth-links">
          <a href="#" onclick="switchForm('form-login')">Quay lại Đăng nhập</a>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
    <script>
      // Hàm chuyển đổi giữa các Form
      function switchForm(formId) {
        document
          .querySelectorAll(".auth-section")
          .forEach((form) => form.classList.remove("active-form"));
        document.getElementById(formId).classList.add("active-form");

        // Xóa dữ liệu cũ khi chuyển form cho sạch sẽ
        document
          .querySelectorAll("input")
          .forEach((input) => (input.value = ""));
      }

      // Lấy danh sách người dùng từ CSDL ảo
      function getUsers() {
        return JSON.parse(localStorage.getItem("users")) || [];
      }
      function saveUsers(users) {
        localStorage.setItem("users", JSON.stringify(users));
      }

      // Xử lý Đăng Nhập
      function handleLogin() {
        const u = document.getElementById("login-user").value.trim();
        const p = document.getElementById("login-pass").value.trim();
        if (!u || !p) return alert("Vui lòng nhập đủ tên và mật khẩu!");

        const users = getUsers();
        const user = users.find((x) => x.username === u && x.password === p);

        if (user) {
          localStorage.setItem("currentUser", JSON.stringify(user));
          window.location.href = "index.html";
        } else {
          alert("Sai tên đăng nhập hoặc mật khẩu!");
        }
      }

      // Xử lý Đăng Ký
      function handleRegister() {
        const u = document.getElementById("reg-user").value.trim();
        const p = document.getElementById("reg-pass").value.trim();
        if (!u || !p) return alert("Vui lòng nhập đủ thông tin!");

        const users = getUsers();
        if (users.find((x) => x.username === u)) {
          return alert(
            "Tên đăng nhập này đã có người sử dụng. Vui lòng chọn tên khác!",
          );
        }

        // Thêm user mới với quyền mặc định là 'customer' (khách hàng)
        users.push({ username: u, password: p, role: "customer" });
        saveUsers(users);

        alert("Đăng ký thành công! Bạn có thể đăng nhập ngay bây giờ.");
        switchForm("form-login"); // Chuyển về trang đăng nhập
      }

      // Xử lý Quên Mật Khẩu (Đặt lại mật khẩu)
      function handleForgot() {
        const u = document.getElementById("forgot-user").value.trim();
        const newP = document.getElementById("forgot-new-pass").value.trim();
        if (!u || !newP)
          return alert("Vui lòng nhập đủ tên tài khoản và mật khẩu mới!");

        let users = getUsers();
        let userIndex = users.findIndex((x) => x.username === u);

        if (userIndex !== -1) {
          // Cập nhật mật khẩu mới
          users[userIndex].password = newP;
          saveUsers(users);
          alert("Đổi mật khẩu thành công! Hãy đăng nhập bằng mật khẩu mới.");
          switchForm("form-login");
        } else {
          alert("Không tìm thấy tài khoản này trong hệ thống!");
        }
      }
    </script>
  </body>
</html>
