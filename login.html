<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tài khoản - Xuân Công Shop</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body.auth-page {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #121212 0%, #2b0b16 100%);
        margin: 0;
        overflow: hidden;
      }
      body.auth-page header {
        position: absolute;
        top: 0;
        width: 100%;
        background: transparent;
        border: none;
        box-shadow: none;
      }
      .form-container {
        width: 100%;
        max-width: 420px;
        background: rgba(30, 30, 30, 0.6);
        backdrop-filter: blur(15px);
        border: 1px solid rgba(233, 30, 99, 0.3);
        box-shadow:
          0 15px 35px rgba(0, 0, 0, 0.5),
          0 0 20px rgba(233, 30, 99, 0.1);
        border-radius: 12px;
        padding: 40px 30px;
        margin: 20px;
        transition: all 0.3s ease;
      }
      .form-container:hover {
        box-shadow:
          0 15px 35px rgba(0, 0, 0, 0.6),
          0 0 40px rgba(233, 30, 99, 0.2);
      }

      /* --- CSS CHO LOGO --- */
      .form-logo {
        display: block;
        margin: 0 auto 15px auto; /* Canh giữa và đẩy các thành phần bên dưới xuống 15px */
        width: 80px; /* Kích thước logo */
        height: 80px;
        object-fit: cover;
        border-radius: 50%; /* Bo tròn logo, nếu logo vuông/chữ nhật thì xóa dòng này đi */
        border: 2px solid var(--primary-color); /* Viền màu hồng */
        box-shadow: 0 0 15px rgba(233, 30, 99, 0.5); /* Hiệu ứng tỏa sáng */
      }

      .form-container h2 {
        text-align: center;
        color: var(--primary-color);
        margin-bottom: 25px;
        font-size: 28px;
        text-transform: uppercase;
        letter-spacing: 2px;
      }

      /* KÉO BẰNG CHIỀU DÀI CÁC Ô VÀ ÉP MÀU CHỮ TRẮNG */
      input {
        width: 100% !important;
        box-sizing: border-box !important;
        background: rgba(0, 0, 0, 0.3) !important;
        border: 1px solid #444 !important;
        color: #ffffff !important;
        font-weight: bold !important;
        transition: all 0.3s ease !important;
        padding: 12px 15px !important;
        font-size: 15px;
        margin-bottom: 15px;
        border-radius: 5px !important;
      }
      input:focus {
        transform: scale(1.02);
        border-color: var(--primary-color) !important;
        box-shadow: 0 0 12px rgba(233, 30, 99, 0.3) !important;
        background: rgba(0, 0, 0, 0.5) !important;
      }
      input::placeholder {
        color: #888 !important;
        font-weight: normal;
      }

      .auth-section {
        display: none;
      }
      .active-form {
        display: block;
        animation: slideUpFade 0.4s ease-out forwards;
      }
      @keyframes slideUpFade {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .auth-links {
        margin-top: 25px;
        text-align: center;
        font-size: 14px;
      }
      .auth-links a {
        color: var(--text-gray);
        text-decoration: none;
        margin: 0 10px;
        transition: 0.2s;
      }
      .auth-links a:hover {
        color: var(--text-light);
        text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
      }
      .highlight-link {
        color: var(--primary-color) !important;
        font-weight: bold;
        font-size: 15px;
      }
    </style>
  </head>
  <body class="auth-page">
    <header>
      <a href="index.html" class="logo" style="margin: 0 auto"
        >Xuân Công Shop</a
      >
    </header>

    <div
      class="container"
      style="display: flex; justify-content: center; width: 100%"
    >
      <div class="form-container auth-section active-form" id="form-login">
        <img
          src="image/logo-xuan-cong-shop.jpg"
          class="form-logo"
          alt="Logo Shop"
        />

        <h2>Đăng Nhập</h2>
        <input
          type="text"
          id="login-user"
          placeholder="Tên đăng nhập (Thử: admin)"
        />
        <div class="pwd-wrapper">
          <input type="password" id="login-pass" placeholder="Mật khẩu" />
          <span class="pwd-toggle" onclick="togglePwd('login-pass', this)"
            >👁️</span
          >
        </div>
        <button
          class="btn-primary"
          style="width: 100%; padding: 12px; font-size: 16px; margin-top: 5px"
          onclick="handleLogin()"
        >
          Đăng Nhập
        </button>

        <div class="auth-links">
          <a
            href="#"
            class="highlight-link"
            onclick="switchForm('form-register')"
            >Tạo tài khoản mới</a
          >
          <br /><br />
          <a href="#" onclick="switchForm('form-forgot')">Quên mật khẩu?</a>
        </div>
      </div>

      <div class="form-container auth-section" id="form-register">
        <img
          src="https://via.placeholder.com/80/E91E63/FFFFFF?text=Logo"
          class="form-logo"
          alt="Logo Shop"
        />

        <h2 style="margin-bottom: 20px">Đăng Ký</h2>
        <input
          type="text"
          id="reg-fullname"
          placeholder="Họ và tên thật của bạn"
        />
        <input
          type="email"
          id="reg-email"
          placeholder="Nhập địa chỉ Gmail (VD: abc@gmail.com)"
        />
        <input
          type="text"
          id="reg-user"
          placeholder="Tên đăng nhập (Viết liền không dấu)"
        />

        <div class="pwd-wrapper">
          <input
            type="password"
            id="reg-pass"
            placeholder="Mật khẩu (Ít nhất 6 ký tự)"
          />
          <span class="pwd-toggle" onclick="togglePwd('reg-pass', this)"
            >👁️</span
          >
        </div>
        <div class="pwd-wrapper">
          <input
            type="password"
            id="reg-confirm-pass"
            placeholder="Nhập lại mật khẩu"
          />
          <span class="pwd-toggle" onclick="togglePwd('reg-confirm-pass', this)"
            >👁️</span
          >
        </div>

        <button
          class="btn-primary"
          style="width: 100%; padding: 12px; font-size: 16px; margin-top: 5px"
          onclick="handleRegister()"
        >
          Đăng Ký Ngay
        </button>

        <div class="auth-links">
          <a href="#" onclick="switchForm('form-login')"
            >Đã có tài khoản? <b>Đăng nhập</b></a
          >
        </div>
      </div>

      <div class="form-container auth-section" id="form-forgot">
        <img
          src="https://via.placeholder.com/80/E91E63/FFFFFF?text=Logo"
          class="form-logo"
          alt="Logo Shop"
        />

        <h2>Khôi Phục</h2>
        <p
          style="
            text-align: center;
            font-size: 13px;
            color: #aaa;
            margin-bottom: 20px;
          "
        >
          Nhập tên tài khoản để đổi mật khẩu mới
        </p>
        <input
          type="text"
          id="forgot-user"
          placeholder="Tên đăng nhập của bạn"
        />
        <div class="pwd-wrapper">
          <input
            type="password"
            id="forgot-new-pass"
            placeholder="Nhập mật khẩu mới"
          />
          <span class="pwd-toggle" onclick="togglePwd('forgot-new-pass', this)"
            >👁️</span
          >
        </div>
        <button
          class="btn-primary"
          style="width: 100%; padding: 12px; font-size: 16px; margin-top: 5px"
          onclick="handleForgot()"
        >
          Đổi Mật Khẩu
        </button>

        <div class="auth-links">
          <a href="#" onclick="switchForm('form-login')">Quay lại Đăng nhập</a>
        </div>
      </div>
    </div>

    <div id="toast-container"></div>

    <script src="script.js"></script>
    <script>
      function switchForm(formId) {
        document
          .querySelectorAll(".auth-section")
          .forEach((form) => form.classList.remove("active-form"));
        document.getElementById(formId).classList.add("active-form");
        document
          .querySelectorAll("input")
          .forEach((input) => (input.value = ""));
        // Reset mắt thần
        document.querySelectorAll(".pwd-toggle").forEach((icon) => {
          icon.innerText = "👁️";
          const input = icon.previousElementSibling;
          if (input) input.type = "password";
        });
        setTimeout(
          () => document.querySelector(`#${formId} input`).focus(),
          100,
        );
      }

      function getUsers() {
        return JSON.parse(localStorage.getItem("users")) || [];
      }
      function saveUsers(users) {
        localStorage.setItem("users", JSON.stringify(users));
      }

      function bindEnterKey(inputId, actionFunction) {
        document
          .getElementById(inputId)
          .addEventListener("keypress", function (e) {
            if (e.key === "Enter") {
              e.preventDefault();
              actionFunction();
            }
          });
      }

      bindEnterKey("login-user", handleLogin);
      bindEnterKey("login-pass", handleLogin);
      bindEnterKey("reg-user", handleRegister);
      bindEnterKey("reg-confirm-pass", handleRegister);
      bindEnterKey("forgot-new-pass", handleForgot);

      function togglePwd(inputId, icon) {
        const input = document.getElementById(inputId);
        if (input.type === "password") {
          input.type = "text";
          icon.innerText = "🙈"; // Mắt nhắm
        } else {
          input.type = "password";
          icon.innerText = "👁️"; // Mắt mở
        }
      }

      function handleLogin() {
        const u = document.getElementById("login-user").value.trim();
        const p = document.getElementById("login-pass").value.trim();
        if (!u || !p)
          return showToast("⚠️ Vui lòng nhập đủ thông tin!", "error");

        const users = getUsers();
        const user = users.find((x) => x.username === u && x.password === p);

        if (user) {
          localStorage.setItem("currentUser", JSON.stringify(user));
          showToast("✅ Đăng nhập thành công!", "success");
          setTimeout(() => (window.location.href = "index.html"), 800);
        } else {
          showToast("❌ Sai tên đăng nhập hoặc mật khẩu!", "error");
        }
      }

      function handleRegister() {
        const fullname = document.getElementById("reg-fullname").value.trim();
        const email = document.getElementById("reg-email").value.trim();
        const u = document.getElementById("reg-user").value.trim();
        const p = document.getElementById("reg-pass").value.trim();
        const cp = document.getElementById("reg-confirm-pass").value.trim();

        // 1. Check rỗng
        if (!fullname || !email || !u || !p || !cp) {
          return showToast("⚠️ Vui lòng điền đầy đủ tất cả các ô!", "error");
        }

        // 2. Check định dạng Email (Phải có @ và .com)
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email)) {
          return showToast(
            "⚠️ Định dạng Email không hợp lệ (VD: abc@gmail.com)!",
            "error",
          );
        }

        // 3. Check định dạng Tên đăng nhập (Chỉ chữ, số, viết liền, ít nhất 4 ký tự)
        const userRegex = /^[a-zA-Z0-9_]{4,}$/;
        if (!userRegex.test(u)) {
          return showToast(
            "⚠️ Tên đăng nhập phải viết liền không dấu, từ 4 ký tự trở lên!",
            "error",
          );
        }

        // 4. Check chiều dài mật khẩu
        if (p.length < 6) {
          return showToast(
            "⚠️ Mật khẩu quá ngắn. Cần ít nhất 6 ký tự!",
            "error",
          );
        }

        // 5. Check trùng khớp mật khẩu
        if (p !== cp) {
          return showToast("❌ Mật khẩu nhập lại không khớp!", "error");
        }

        // 6. Check trùng tên trong CSDL
        const users = getUsers();
        if (users.find((x) => x.username === u)) {
          return showToast(
            "❌ Tên đăng nhập đã có người sử dụng. Hãy chọn tên khác!",
            "error",
          );
        }

        // Đạt chuẩn -> Lưu vào CSDL
        users.push({
          fullname,
          email,
          username: u,
          password: p,
          role: "customer",
        });
        saveUsers(users);

        showToast("✅ Đăng ký thành công! Đang chuyển hướng...", "success");
        setTimeout(() => switchForm("form-login"), 1500);
      }

      function handleForgot() {
        const u = document.getElementById("forgot-user").value.trim();
        const newP = document.getElementById("forgot-new-pass").value.trim();
        if (!u || !newP)
          return showToast("⚠️ Nhập đủ tài khoản và mật khẩu mới!", "error");

        if (newP.length < 6)
          return showToast("⚠️ Mật khẩu mới phải có ít nhất 6 ký tự!", "error");

        let users = getUsers();
        let userIndex = users.findIndex((x) => x.username === u);

        if (userIndex !== -1) {
          users[userIndex].password = newP;
          saveUsers(users);
          showToast("✅ Đổi mật khẩu thành công!", "success");
          setTimeout(() => switchForm("form-login"), 1000);
        } else {
          showToast("❌ Không tìm thấy tài khoản này trong hệ thống!", "error");
        }
      }
    </script>
  </body>
</html>
